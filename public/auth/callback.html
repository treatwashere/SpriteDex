<!DOCTYPE html>
<html>
<head>
    <title>Logging in...</title>
</head>
<body>
    <script>
        // Redirect back to home with auth code in URL
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        if (code) {
            window.location.href = '/?code=' + code;
        } else {
            window.location.href = '/';
        }
    </script>
</body>
</html>
