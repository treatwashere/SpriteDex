<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortnite Sprite Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --fn-bg: #0b0d13;
            --fn-panel-bg: #181c25;
            --fn-yellow: #f4c430;
            --fn-border: #3b4253;
            --fn-neon-cyan: #00f0ff;
            --fn-unreleased: #ef4444;

            /* Theme Gradients */
            --gradient-Basic: linear-gradient(180deg, #2575fc 0%, #6a11cb 100%);
            --gradient-Gold: linear-gradient(180deg, #fcd34d 0%, #b45309 100%);
            --gradient-Candy: linear-gradient(180deg, #ff758c 0%, #ff7eb3 100%);
            --gradient-Galaxy: linear-gradient(180deg, #1d1b4b 0%, #4c1d95 50%, #701a75 100%);
            --gradient-Gem: linear-gradient(180deg, #06b6d4 0%, #0891b2 100%);
            --gradient-Holofoil: linear-gradient(135deg, #a5b4fc 0%, #6366f1 25%, #ec4899 50%, #14b8a6 75%, #f59e0b 100%);
        }

        * {
            box-sizing: border-box;
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
        }

        body {
            background-color: var(--fn-bg);
            background-image: radial-gradient(circle at 50% 50%, #1c2333 0%, #0b0d13 100%);
            color: #ffffff;
            margin: 0;
            padding: 20px;
            letter-spacing: 0.5px;
        }

        .fn-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #ffffff;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .brand-title {
            font-size: 38px;
            font-weight: 900;
            font-style: italic;
            text-shadow: 2px 2px 0px #000;
        }

        .brand-title span {
            color: #8892b0;
            font-weight: 500;
        }

        .user-tag {
            font-size: 24px;
            font-style: italic;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1));
            padding: 5px 20px;
            border-right: 4px solid var(--fn-yellow);
        }

        .app-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
            align-items: start;
        }

        @media (max-width: 900px) {
            .app-layout { grid-template-columns: 1fr; }
        }

        .sidebar {
            background-color: var(--fn-panel-bg);
            border: 3px solid var(--fn-border);
            border-radius: 8px;
            padding: 20px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        .filter-header {
            font-size: 14px;
            color: #8a929e;
            margin: 0 0 8px 0;
            font-style: italic;
        }

        .filter-header:not(:first-child) {
            margin-top: 20px;
        }

        .fn-input, .fn-select {
            width: 100%;
            background-color: #0e1117;
            border: 2px solid var(--fn-border);
            color: #fff;
            padding: 10px;
            font-size: 16px;
            border-radius: 4px;
        }

        .fn-input:focus, .fn-select:focus {
            border-color: var(--fn-neon-cyan);
            outline: none;
        }

        .sprite-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .sprite-card {
            background-color: #171c26;
            border: 3px solid #2d3648;
            border-radius: 8px;
            padding: 5px;
            position: relative;
            cursor: pointer;
            aspect-ratio: 1 / 1.15;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            transition: transform 0.15s, border-color 0.15s;
        }

        .sprite-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none;
            z-index: 3;
        }

        .sprite-card:hover {
            transform: translateY(-4px);
            border-color: #4b5975;
        }

        .sprite-card.theme-Basic .card-inner-display { background: var(--gradient-Basic); }
        .sprite-card.theme-Gold .card-inner-display { background: var(--gradient-Gold); }
        .sprite-card.theme-Candy .card-inner-display { background: var(--gradient-Candy); }
        .sprite-card.theme-Galaxy .card-inner-display { background: var(--gradient-Galaxy); }
        .sprite-card.theme-Gem .card-inner-display { background: var(--gradient-Gem); }
        .sprite-card.theme-Holofoil .card-inner-display { background: var(--gradient-Holofoil); }

        .card-inner-display {
            flex: 1;
            width: 100%;
            border-radius: 4px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-inner-display::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0; height: 40%;
            background: linear-gradient(0deg, rgba(0,0,0,0.4) 0%, transparent 100%);
            pointer-events: none;
        }

        .sprite-img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
            filter: drop-shadow(0px 8px 8px rgba(0,0,0,0.5));
            z-index: 2;
        }

        .sprite-card .crown-indicator {
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            font-size: 20px;
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .sprite-card.obtained .crown-indicator {
            transform: translateX(-50%) scale(1.3);
        }

        .sprite-card.obtained {
            border-color: var(--fn-yellow);
            box-shadow: 0 0 15px rgba(244, 196, 48, 0.4);
        }

        .status-badge {
            position: absolute;
            bottom: 4px;
            left: 4px;
            background: rgba(0, 0, 0, 0.8);
            color: #ffffff;
            font-size: 11px;
            font-weight: 700;
            font-style: italic;
            padding: 1px 6px;
            border-radius: 3px;
            z-index: 4;
            letter-spacing: 0px;
        }

        .status-badge.unreleased {
            border-left: 3px solid var(--fn-unreleased);
            color: var(--fn-unreleased);
        }

        .card-title-footer {
            font-size: 12px;
            font-weight: 700;
            text-align: center;
            padding: 4px 0 2px 0;
            color: #e2e8f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
    
    <script src="sprites-data.js"></script>
</head>
<body>

<div class="container">
    <header class="fn-navbar">
        <div class="brand-title">👑 FORTNITE SPRITES TRACKER <span id="navbar-stats">0/0 COLLECTED</span></div>
        <div class="user-tag">USER COLLECTION</div>
    </header>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="filter-header">SEARCH BOX FOR NAME</div>
            <input type="text" id="search" class="fn-input" placeholder="Search for name...">
            
            <div class="filter-header">SORT BY THEME</div>
            <select id="theme-filter" class="fn-select">
                <option value="all">ALL THEMES</option>
                <option value="Basic">BASIC</option>
                <option value="Gold">GOLD</option>
                <option value="Candy">CANDY</option>
                <option value="Galaxy">GALAXY</option>
                <option value="Gem">GEM</option>
                <option value="Holofoil">HOLOFOIL</option>
            </select>

            <div class="filter-header">COLLECTION PROGRESS</div>
            <select id="status-filter" class="fn-select">
                <option value="all">ALL SPRITES</option>
                <option value="obtained">OWNED (👑)</option>
                <option value="missing">NOT OWNED</option>
            </select>
        </aside>

        <main class="sprite-grid" id="spriteGrid"></main>
    </div>
</div>

<script>
    let obtainedSprites = JSON.parse(localStorage.getItem('fn_obtained_sprites')) || [];

    const spriteGrid = document.getElementById('spriteGrid');
    const searchInput = document.getElementById('search');
    const themeFilter = document.getElementById('theme-filter');
    const statusFilter = document.getElementById('status-filter');
    const navbarStats = document.getElementById('navbar-stats');

    // New helper function to count tracked progress of active/released items
    function updateCollectionCounter() {
        if (typeof baseSprites === 'undefined') return;

        // Count items in sprites-data.js that are NOT unreleased
        const totalReleased = baseSprites.filter(sprite => !sprite.unreleased).length;

        // Count how many of those released items are saved inside your obtained array
        const collectedReleased = baseSprites.filter(sprite => !sprite.unreleased && obtainedSprites.includes(sprite.id)).length;

        // Dynamically print the format to the top header view area
        navbarStats.textContent = `${collectedReleased}/${totalReleased} COLLECTED`;
    }

    function renderGrid() {
        spriteGrid.innerHTML = '';
        
        if (typeof baseSprites === 'undefined') {
            spriteGrid.innerHTML = '<div style="padding:20px; color:var(--fn-unreleased);">Error: sprites-data.js file missing or incorrect layout.</div>';
            return;
        }

        // Keep the tracker data matching changes smoothly whenever cards load or are filtered
        updateCollectionCounter();

        const searchQuery = searchInput.value.toLowerCase();
        const selectedTheme = themeFilter.value;
        const selectedStatus = statusFilter.value;

        baseSprites.forEach(sprite => {
            const isObtained = obtainedSprites.includes(sprite.id);
            const matchesSearch = sprite.name.toLowerCase().includes(searchQuery);
            const matchesTheme = selectedTheme === 'all' || sprite.theme === selectedTheme;
            const matchesStatus = selectedStatus === 'all' || (selectedStatus === 'obtained' && isObtained) || (selectedStatus === 'missing' && !isObtained);

            if (matchesSearch && matchesTheme && matchesStatus) {
                const card = document.createElement('div');
                card.className = `sprite-card theme-${sprite.theme} ${isObtained ? 'obtained' : ''}`;
                
                const badgeHTML = sprite.unreleased ? `<div class="status-badge unreleased">UNRELEASED</div>` : '';
                
                const inferredImagePath = `sprites/${sprite.id}.png`;

                card.innerHTML = `
                    <div class="crown-indicator">👑</div>
                    <div class="card-inner-display">
                        <img src="${inferredImagePath}" class="sprite-img" alt="${sprite.name}" onerror="this.src='https://placehold.co/150?text=Missing+File'">
                        ${badgeHTML}
                    </div>
                    <div class="card-title-footer">${sprite.name}</div>
                `;
                
                card.addEventListener('click', () => toggleObtained(sprite.id));
                spriteGrid.appendChild(card);
            }
        });
    }

    function toggleObtained(id) {
        if (obtainedSprites.includes(id)) {
            obtainedSprites = obtainedSprites.filter(item => item !== id);
        } else {
            obtainedSprites.push(id);
        }
        localStorage.setItem('fn_obtained_sprites', JSON.stringify(obtainedSprites));
        renderGrid();
    }

    searchInput.addEventListener('input', renderGrid);
    themeFilter.addEventListener('change', renderGrid);
    statusFilter.addEventListener('change', renderGrid);

    renderGrid();
</script>
</body>
</html>
