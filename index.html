<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortnite Sprites Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --fn-bg: #0b0d13;
            --fn-panel-bg: #181c25;
            --fn-yellow: #f4c430;
            --fn-blue-top: #2575fc;
            --fn-purple-bot: #6a11cb;
            --fn-gold-top: #fcd34d;
            --fn-gold-bot: #b45309;
            --fn-border: #3b4253;
            --fn-neon-cyan: #00f0ff;
        }

        * {
            box-sizing: border-box;
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
        }

        body {
            background-color: var(--fn-bg);
            background-image: radial-gradient(circle at 50% 50%, #1c2333 0%, #0b0d13 100%);
            color: #ffffff;
            margin: 0;
            padding: 20px;
            letter-spacing: 0.5px;
        }

        /* Top Header Navigation bar styled like Fortnite menus */
        .fn-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #ffffff;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .brand-title {
            font-size: 38px;
            font-weight: 900;
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 2px 2px 0px #000;
        }

        .brand-title span {
            color: #8892b0;
            font-weight: 500;
        }

        .user-tag {
            font-size: 24px;
            font-style: italic;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1));
            padding: 5px 20px;
            border-right: 4px solid var(--fn-yellow);
        }

        /* Layout Grid split into Control Sidebar and Main Display Workspace */
        .app-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
            align-items: start;
        }

        @media (max-width: 900px) {
            .app-layout { grid-template-columns: 1fr; }
        }

        /* Fortnite UI Sidebar Box */
        .sidebar {
            background-color: var(--fn-panel-bg);
            border: 3px solid var(--fn-border);
            border-radius: 8px;
            padding: 20px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        /* Slanted Action Buttons */
        .fn-btn {
            width: 100%;
            background: var(--fn-yellow);
            color: #000000;
            font-size: 18px;
            font-weight: 700;
            font-style: italic;
            padding: 12px;
            border: none;
            margin-bottom: 12px;
            cursor: pointer;
            text-align: left;
            position: relative;
            clip-path: polygon(0 0, 95% 0, 100% 100%, 5% 100%);
            transition: transform 0.1s, filter 0.2s;
        }

        .fn-btn::after {
            content: "⚡";
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
        }

        .fn-btn:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
        }

        .filter-header {
            font-size: 14px;
            color: #8a929e;
            margin: 20px 0 8px 0;
            font-style: italic;
        }

        /* Modernized inputs */
        .fn-input, .fn-select {
            width: 100%;
            background-color: #0e1117;
            border: 2px solid var(--fn-border);
            color: #fff;
            padding: 10px;
            font-size: 16px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .fn-input:focus, .fn-select:focus {
            border-color: var(--fn-neon-cyan);
            outline: none;
        }

        #sprite-upload { display: none; }

        /* The Main Grid system matching the layout proportions */
        .sprite-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        /* AUTHENTIC FORTNITE BOXES: Metallic frame, glowing gradient backgrounds */
        .sprite-card {
            background-color: #171c26;
            border: 3px solid #2d3648;
            border-radius: 8px;
            padding: 5px;
            position: relative;
            cursor: pointer;
            aspect-ratio: 1 / 1.15;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            transition: transform 0.15s, border-color 0.15s;
        }

        /* Subtle mechanical corner cuts to replicate the reference image borders */
        .sprite-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none;
            z-index: 3;
        }

        /* Animated cyan frame accents when hovered or checked */
        .sprite-card:hover {
            transform: translateY(-4px);
            border-color: #4b5975;
        }

        /* Fortnite Item Grade Color Gradients */
        .sprite-card.variant-Base .card-inner-display {
            background: linear-gradient(180deg, var(--fn-blue-top) 0%, var(--fn-purple-bot) 100%);
        }

        .sprite-card.variant-Gold .card-inner-display {
            background: linear-gradient(180deg, var(--fn-gold-top) 0%, var(--fn-gold-bot) 100%);
        }
        
        .sprite-card.variant-Custom .card-inner-display {
            background: linear-gradient(180deg, #34d399 0%, #065f46 100%);
        }

        /* Display Wrapper inside the Outer Border Frame */
        .card-inner-display {
            flex: 1;
            width: 100%;
            border-radius: 4px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Angular shadows inside the card items */
        .card-inner-display::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0; hieght: 40%;
            background: linear-gradient(0deg, rgba(0,0,0,0.4) 0%, transparent 100%);
            pointer-events: none;
        }

        .sprite-img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
            filter: drop-shadow(0px 8px 8px rgba(0,0,0,0.5));
            z-index: 2;
        }

        /* Item Checklist Active Crown Crown Marker */
        .sprite-card .crown-indicator {
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            font-size: 20px;
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Smooth transition for crown popup appearance */
        .sprite-card.obtained .crown-indicator {
            transform: translateX(-50%) scale(1.3);
        }

        /* Locked / Active Highlight Framework overrides */
        .sprite-card.obtained {
            border-color: var(--fn-yellow);
            box-shadow: 0 0 15px rgba(244, 196, 48, 0.4);
        }

        /* Level Ribbon Graphic from your Game Screenshot */
        .lvl-badge {
            position: absolute;
            bottom: 4px;
            left: 4px;
            background: rgba(0, 0, 0, 0.75);
            color: #ffffff;
            font-size: 13px;
            font-weight: 700;
            font-style: italic;
            padding: 1px 8px;
            border-radius: 3px;
            border-left: 3px solid var(--fn-neon-cyan);
            z-index: 4;
        }

        .sprite-card.obtained .lvl-badge {
            border-left-color: var(--fn-yellow);
        }

        /* Label at base of frame for identifying names */
        .card-title-footer {
            font-size: 12px;
            font-weight: 700;
            text-align: center;
            padding: 4px 0 2px 0;
            color: #e2e8f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Popup Windows */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            justify-content: center; align-items: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background-color: var(--fn-panel-bg);
            padding: 25px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            border: 3px solid var(--fn-border);
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .modal-btn {
            flex: 1;
            padding: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <header class="fn-navbar">
        <div class="brand-title">👑 FORTNITE SPRITES TRACKER <span>SPRITE CATALOGUE</span></div>
        <div class="user-tag">USER COLLECTION</div>
    </header>

    <div class="app-layout">
        <aside class="sidebar">
            <label for="sprite-upload" class="fn-btn">ADD NEW SPRITE VARIANT</label>
            <input type="file" id="sprite-upload" accept="image/*">
            
            <div class="filter-header">SEARCH BOX FOR NAME</div>
            <input type="text" id="search" class="fn-input" placeholder="Search for name...">
            
            <div class="filter-header">SORT BY STYLE</div>
            <select id="variant-filter" class="fn-select">
                <option value="all">ALL STYLES</option>
                <option value="Base">BASE STYLE (BLUE/PURPLE)</option>
                <option value="Gold">GOLD STYLE (GOLDEN)</option>
                <option value="Custom">CUSTOM ENTRIES</option>
            </select>

            <div class="filter-header">COLLECTION PROGRESS</div>
            <select id="status-filter" class="fn-select">
                <option value="all">ALL SPRITES</option>
                <option value="obtained">OWNED (👑)</option>
                <option value="missing">NOT OWNED</option>
            </select>
        </aside>

        <main class="sprite-grid" id="spriteGrid"></main>
    </div>
</div>

<div class="modal" id="uploadModal">
    <div class="modal-content">
        <h2 style="margin-top:0; font-style: italic;">NEW SPRITE FILE DETECTED</h2>
        <div class="filter-header">SPRITE IDENTITY NAME</div>
        <input type="text" id="modal-name" class="fn-input" placeholder="e.g. Slurp Sprite">
        
        <div class="filter-header">ASSIGN ITEM STYLE</div>
        <select id="modal-variant" class="fn-select">
            <option value="Base">Base Style (Epic Blue)</option>
            <option value="Gold">Gold Style (Legendary Gold)</option>
            <option value="Custom">Custom Entry</option>
        </select>
        
        <div class="modal-buttons">
            <button class="modal-btn" id="modal-cancel" style="background-color:#4a5262; color:#fff;">ABORT</button>
            <button class="modal-btn" id="modal-save" style="background-color:var(--fn-yellow); color:#000;">SAVE DATA</button>
        </div>
    </div>
</div>

<script>
    // Live reference parameters for sprites matching the user's provided snapshot layout
    const baseSprites = [
        { id: "water_base", name: "Water Sprite", variant: "Base", image: "https://placehold.co/150x150/1d4ed8/ffffff?text=Water" },
        { id: "water_gold", name: "Water Sprite", variant: "Gold", image: "https://placehold.co/150x150/eab308/000000?text=Gold+Water" },
        { id: "earth_base", name: "Earth Sprite", variant: "Base", image: "https://placehold.co/150x150/15803d/ffffff?text=Earth" },
        { id: "fire_base", name: "Fire Sprite", variant: "Base", image: "https://placehold.co/150x150/b91c1c/ffffff?text=Fire" },
        { id: "fire_gold", name: "Fire Sprite", variant: "Gold", image: "https://placehold.co/150x150/eab308/000000?text=Gold+Fire" },
        { id: "demon_base", name: "Demon Sprite", variant: "Base", image: "https://placehold.co/150x150/4b5563/ffffff?text=Demon" },
        { id: "demon_gold", name: "Demon Sprite", variant: "Gold", image: "https://placehold.co/150x150/eab308/000000?text=Gold+Demon" },
        { id: "duck_base", name: "Duck Sprite", variant: "Base", image: "https://placehold.co/150x150/a21caf/ffffff?text=Duck" },
        { id: "duck_gold", name: "Duck Sprite", variant: "Gold", image: "https://placehold.co/150x150/eab308/000000?text=Gold+Duck" },
        { id: "ghost_base", name: "Ghost Sprite", variant: "Base", image: "https://placehold.co/150x150/6b21a8/ffffff?text=Ghost" },
        { id: "ghost_gold", name: "Ghost Sprite", variant: "Gold", image: "https://placehold.co/150x150/eab308/000000?text=Gold+Ghost" },
        { id: "king_base", name: "King Sprite", variant: "Base", image: "https://placehold.co/150x150/4338ca/ffffff?text=King" },
        { id: "king_gold", name: "King Sprite", variant: "Gold", image: "https://placehold.co/150x150/eab308/000000?text=Gold+King" },
        { id: "punk_base", name: "Punk Sprite", variant: "Base", image: "https://placehold.co/150x150/0f172a/ffffff?text=Punk" },
        { id: "dream_base", name: "Dream Sprite", variant: "Base", image: "https://placehold.co/150x150/db2777/ffffff?text=Dream" }
    ];

    let customSprites = JSON.parse(localStorage.getItem('fn_custom_sprites')) || [];
    let obtainedSprites = JSON.parse(localStorage.getItem('fn_obtained_sprites')) || [];
    let temporaryImgData = null;

    const spriteGrid = document.getElementById('spriteGrid');
    const searchInput = document.getElementById('search');
    const variantFilter = document.getElementById('variant-filter');
    const statusFilter = document.getElementById('status-filter');
    const fileInput = document.getElementById('sprite-upload');
    const uploadModal = document.getElementById('uploadModal');

    function renderGrid() {
        spriteGrid.innerHTML = '';
        const allSprites = [...baseSprites, ...customSprites];
        
        const searchQuery = searchInput.value.toLowerCase();
        const selectedVariant = variantFilter.value;
        const selectedStatus = statusFilter.value;

        allSprites.forEach(sprite => {
            const isObtained = obtainedSprites.includes(sprite.id);
            
            const matchesSearch = sprite.name.toLowerCase().includes(searchQuery);
            const matchesVariant = selectedVariant === 'all' || sprite.variant === selectedVariant;
            const matchesStatus = selectedStatus === 'all' || (selectedStatus === 'obtained' && isObtained) || (selectedStatus === 'missing' && !isObtained);

            if (matchesSearch && matchesVariant && matchesStatus) {
                const card = document.createElement('div');
                card.className = `sprite-card variant-${sprite.variant} ${isObtained ? 'obtained' : ''}`;
                
                card.innerHTML = `
                    <div class="crown-indicator">👑</div>
                    <div class="card-inner-display">
                        <img src="${sprite.image}" class="sprite-img" alt="${sprite.name}">
                        <div class="lvl-badge">LVL 5</div>
                    </div>
                    <div class="card-title-footer">${sprite.name}</div>
                `;
                
                card.addEventListener('click', () => toggleObtained(sprite.id));
                spriteGrid.appendChild(card);
            }
        });
    }

    function toggleObtained(id) {
        if (obtainedSprites.includes(id)) {
            obtainedSprites = obtainedSprites.filter(item => item !== id);
        } else {
            obtainedSprites.push(id);
        }
        localStorage.setItem('fn_obtained_sprites', JSON.stringify(obtainedSprites));
        renderGrid();
    }

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                temporaryImgData = event.target.result;
                uploadModal.style.display = 'flex';
            };
            reader.readAsDataURL(file);
        }
    });

    document.getElementById('modal-save').addEventListener('click', () => {
        const name = document.getElementById('modal-name').value.trim() || "NEW SPRITE";
        const variant = document.getElementById('modal-variant').value;
        const uniqueId = 'custom_' + Date.now();

        if (temporaryImgData) {
            const newSprite = { id: uniqueId, name, variant, image: temporaryImgData };
            customSprites.push(newSprite);
            localStorage.setItem('fn_custom_sprites', JSON.stringify(customSprites));
            
            document.getElementById('modal-name').value = '';
            uploadModal.style.display = 'none';
            fileInput.value = '';
            renderGrid();
        }
    });

    document.getElementById('modal-cancel').addEventListener('click', () => {
        uploadModal.style.display = 'none';
        fileInput.value = '';
    });

    searchInput.addEventListener('input', renderGrid);
    variantFilter.addEventListener('change', renderGrid);
    statusFilter.addEventListener('change', renderGrid);

    renderGrid();
</script>
</body>
</html>
